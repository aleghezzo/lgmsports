# Dev environment for LGM Sports.
#
# Brings up the PHP backend (Slim 3 on PHP 7.4 built-in server) and a MySQL
# instance pre-seeded with cli/dump.sql + cli/data.sql.
#
# Usage:
#   docker compose up --build
#   open http://localhost:8000/web/   # SPA shell (build it first: cd frontend && npm run build)
#   open http://localhost:8000/api/   # PHP API
#
# The frontend Vite dev server is intentionally left out of this stack;
# run it on the host with `cd frontend && npm run dev` as documented in
# README.md. It already proxies /api/* to http://localhost:8000.

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: futbolmixto
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Numeric prefixes control init order: schema first, then prod-data
      # snapshot. fixtures.sql is generated by cli/dump_prod_fixtures.py and
      # already TRUNCATEs each table, so it supersedes cli/data.sql.
      - ./cli/dump.sql:/docker-entrypoint-initdb.d/01-dump.sql:ro
      - ./cli/fixtures.sql:/docker-entrypoint-initdb.d/02-fixtures.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  php:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: futbolmixto
      DB_USER: dev
      DB_PASSWORD: dev
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html

volumes:
  db_data:
